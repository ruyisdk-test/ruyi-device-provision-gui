name: Tag build

on:
  push:
    tags:
      - "*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  pyinstaller:
    name: PyInstaller / ${{ matrix.name }}
    runs-on: ${{ matrix.runs-on }}
    container: ${{ matrix.container }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: debian-12
            runs-on: ubuntu-latest
            container: debian:12-slim
            artifact-arch: amd64
          - name: macos-14
            runs-on: macos-14
            container: null
            artifact-arch: macos-arm64

    steps:
      - name: Install Debian dependencies
        if: matrix.container != null
        run: |
          apt-get update
          apt-get install --no-install-recommends -y \
            binutils \
            ca-certificates \
            curl \
            git \
            libdbus-1-3 \
            libegl1 \
            libfontconfig1 \
            libgl1 \
            libglib2.0-0 \
            libx11-6 \
            libx11-xcb1 \
            libxcb-cursor0 \
            libxcb-icccm4 \
            libxcb-image0 \
            libxcb-keysyms1 \
            libxcb-randr0 \
            libxcb-render-util0 \
            libxcb-shape0 \
            libxcb-shm0 \
            libxcb-sync1 \
            libxcb-xfixes0 \
            libxcb-xkb1 \
            libxcb1 \
            libxext6 \
            libxkbcommon-x11-0 \
            libxkbcommon0 \
            libxrender1

      - name: Check out source
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Install Python
        run: uv python install 3.12

      - name: Sync locked dependencies
        run: uv sync --locked --python 3.12

      - name: Build PyInstaller executable
        run: |
          uv run --locked --with pyinstaller pyinstaller \
            --clean \
            --onefile \
            --name oh-my-ruyi \
            --collect-data oh_my_ruyi \
            --collect-all ruyi \
            oh_my_ruyi/__main__.py

      - name: Name executable
        shell: bash
        run: |
          version="${GITHUB_REF_NAME#v}"
          artifact="oh-my-ruyi-${version}.${{ matrix.artifact-arch }}"
          cp dist/oh-my-ruyi "$artifact"
          chmod +x "$artifact"
          echo "artifact=$artifact" >> "$GITHUB_ENV"

      - name: Upload executable artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.artifact }}
          path: ${{ env.artifact }}
          if-no-files-found: error

  prerelease:
    name: Create prerelease
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    needs: pyinstaller
    runs-on: ubuntu-latest

    steps:
      - name: Download executables
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Create prerelease
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            release-assets/oh-my-ruyi-* \
            --prerelease \
            --title "${GITHUB_REF_NAME}" \
            --notes ""
